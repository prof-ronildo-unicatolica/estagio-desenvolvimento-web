# Configuracao padrada do Ruff
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
]

line-length = 88
indent-width = 4
target-version = "py310"

[lint]
select = ["E4", "E7", "E9", "F", "I"]
ignore = []
fixable = ["ALL"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
